<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTI RÁDIO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #080808; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; gap: 20px; }
        .panel { background: #111; padding: 25px; border-radius: 8px; text-align: center; width: 380px; border: 2px solid #ff9900; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
        .station-btn { background-color: #000; padding: 10px; cursor: pointer; border-radius: 4px; border: 1px solid #555; color: #fff; transition: 0.3s; display: flex; align-items: center; gap: 10px; text-transform: uppercase; font-weight: bold; width: 100%; }
        .station-btn img { width: 30px; height: 30px; border-radius: 4px; object-fit: cover; }
        .station-btn:hover, .station-btn.active { border-color: #ff9900; background: #222; box-shadow: 0 0 10px #ff9900; }
        audio { width: 390px; margin-top: 10px; }
        #status-display { color: #aaa; font-size: 12px; background: #000; padding: 10px; border-radius: 4px; border: 1px solid #333; width: 370px; text-align: center; }
    </style>
</head>
<body>

    <div class="panel">
        <h2 style="color: #ff9900;">[ TODAS AS ESTAÇÕES ]</h2>
        <div id="btn-group" class="btn-group">
            </div>
    </div>

    <audio id="audio" controls autoplay></audio>
    <div id="status-display">STATUS: CARREGANDO RÁDIOS...</div>

    <script>
        const group = document.getElementById('btn-group');
        const audio = document.getElementById('audio');
        const statusDisplay = document.getElementById('status-display');
        let hls;

        fetch('radios.json')
            .then(response => response.json())
            .then(radios => {
                statusDisplay.innerText = "Status: PRONTO";
                radios.forEach(radio => {
                    const btn = document.createElement('button');
                    btn.className = 'station-btn';
                    btn.innerHTML = `<img src="${radio.logo}"> ${radio.nome}`;
                    btn.onclick = () => {
                        // Limpa seleção anterior
                        document.querySelectorAll('.station-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        
                        statusDisplay.innerText = `CONECTANDO: ${radio.nome}`;
                        
                        if (hls) hls.destroy();
                        
                        if (radio.url.includes('.m3u8')) {
                            hls = new Hls();
                            hls.loadSource(radio.url);
                            hls.attachMedia(audio);
                            hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play());
                        } else {
                            audio.src = radio.url;
                            audio.play();
                        }
                        statusDisplay.innerText = `TOCANDO: ${radio.nome}`;
                    };
                    group.appendChild(btn);
                });
            })
            .catch(err => {
                console.error("Erro ao carregar JSON:", err);
                statusDisplay.innerText = "ERRO AO CARREGAR RÁDIOS!";
            });
    </script>
</body>
</html>
